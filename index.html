    // --- FONCTIONS PAGE 3 (SAISIE) ---
    function ajouterChar(c) { document.getElementById("numInput").value += c; }
    function vider() {
        document.getElementById("numInput").value = "";
        document.getElementById("zoneResultat").innerHTML = "<em>En attente de calcul...</em>";
    }
    function effacer() {
        let val = document.getElementById("numInput").value;
        document.getElementById("numInput").value = val.slice(0, -1);
    }

    // --- conversion---
    function convertir() {
        let input = document.getElementById("numInput").value.trim().toUpperCase();
        let fromBase = parseInt(document.getElementById("bOrigine").value);
        let toBase = parseInt(document.getElementById("bCible").value);
        let decimal = parseInt(input, fromBase);
        if (isNaN(decimal)) { alert("Nombre invalide !"); return; }

        let html = "<strong>DÉMARCHE :</strong><br><table class='demarche'><tr><th>Div</th><th>Quotient</th><th>Reste</th></tr>";
        let resteFinal = "";
        let n = decimal;
        if (n === 0) resteFinal = "0";
        while (n > 0) {
            let r = n % toBase;
            let rAffiche = (r >= 10) ? String.fromCharCode(55 + r) : r;
            html += "<tr><td>"+n+"/"+toBase+"</td><td>"+Math.floor(n/toBase)+"</td><td style='color:yellow;'>"+rAffiche+"</td></tr>";
            resteFinal = rAffiche.toString() + resteFinal;
            n = Math.floor(n / toBase);
        }
        html += "</table><h3 style='color:#00ff00;'>RÉSULTAT : " + resteFinal + "</h3>";
        document.getElementById("zoneResultat").innerHTML = html;
    }


</script>
